<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بحث شامل - قصي ستور</title>
  <link rel="icon" href="https://i.ibb.co/zHC1tQ8b/1757362837638.png" type="image/png">

  <!-- خطوط وأيقونات -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />

  <!-- أنماط الهيدر والمحتوى المشترك -->
  <link rel="stylesheet" href="header.css" />

  <!-- مبدئياً ثيم داكن لمنع اللمعة -->
  <style id="critical-theme">html{background:#0b1220;color:#e6edf3}body{background:inherit;color:inherit;margin:0}</style>

  <style>
    :root{ --card-bg:#ffffff; --card-text:#111827; --card-border:#e5e7eb; --input-bg:#ffffff; --input-text:#111827; --input-border:#0ea5e9; --input-border-focus:#0284c7; --input-focus-glow:rgba(14,165,233,.35); --btn-bg:#0ea5e9; --btn-bg-hover:#0284c7; --btn-text:#ffffff; --skeleton:#f0f0f0 }
    html[data-theme="dark"], body.dark-mode{ --card-bg:#0f172a; --card-text:#e6edf3; --card-border:#334155; --input-bg:#0b1220; --input-text:#e6edf3; --btn-bg:#475569; --btn-bg-hover:#64748b; --btn-text:#ffffff; --skeleton:#162032 }

    main{max-width:980px;margin:20px auto;padding:0 15px}
    .search-container{margin:10px auto 18px;max-width:720px;display:flex;gap:10px;align-items:center}
    .search-container input[type="text"]{flex:1;padding:12px 15px;background:var(--input-bg);color:var(--input-text);border:2px solid var(--input-border);border-radius:25px;font-size:1rem;outline:none;transition:.3s}
    .search-container input[type="text"]:focus{box-shadow:0 0 6px var(--input-focus-glow);border-color:var(--input-border-focus)}
    .search-container button{background:var(--btn-bg);border:none;padding:12px 18px;border-radius:25px;color:var(--btn-text);cursor:pointer;transition:.3s}
    .search-container button:hover{background:var(--btn-bg-hover)}

    .results{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
    .result-card{background:var(--card-bg);color:var(--card-text);border:1px solid var(--card-border);border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.12);padding:14px;display:flex;gap:10px;align-items:center;text-decoration:none}
    .result-card:hover{box-shadow:0 8px 20px rgba(0,0,0,.15);transform:translateY(-2px)}
    .result-card i{font-size:1.2rem;color:#0ea5e9}
    html[data-theme="dark"] .result-card i{color:#38bdf8}
    .result-title{font-weight:800;margin:0}
    .result-desc{margin:2px 0 0 0;color:#888;font-size:.92rem}
    html[data-theme="dark"] .result-desc{color:#94a3b8}

    .no-results{text-align:center;color:#94a3b8;margin:22px 0;font-weight:700}
  </style>
</head>
<body>
  <div id="headerContainer"></div>
  <div id="sidebarContainer"></div>

  <main>
    <h1 style="margin:6px 0 10px 0;font-size:1.35rem">بحث في جميع صفحات الموقع</h1>
    <div class="search-container">
      <input id="globalSearchInput" type="text" placeholder="اكتب اسم اللعبة، الخدمة أو الصفحة..." aria-label="بحث شامل" />
      <button id="globalSearchBtn" aria-label="ابحث"><i class="fa-solid fa-magnifying-glass"></i></button>
    </div>
    <section id="results" class="results"></section>
    <p id="noRes" class="no-results" style="display:none">لا توجد نتائج مطابقة.</p>
  </main>

  <script defer src="header.js"></script>
  <script>
    // ثيم مبكّر
    (function(){
      try{
        var t = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : 'dark');
        if (t==='dark') document.body.classList.add('dark-mode');
      }catch(_){ }
    })();

    // فهرس الصفحات (ثابت بدون خادم)
    const PAGES = [
      { path:'index.html',        title:'الرئيسية',        icon:'fa-house',          tags:'رئيسية متجر عروض أقسام' },
      { path:'games.html',        title:'كل الألعاب',      icon:'fa-gamepad',        tags:'العاب ألعاب شحن game games' },
      { path:'weplay.html',       title:'ويبلاي',          icon:'fa-gamepad',        tags:'weplay وي بلي ذهب vip عضوية' },
      { path:'freefire.html',     title:'فري فاير',        icon:'fa-fire',           tags:'free fire فري فاير شحن جواهر membership' },
      { path:'freefireauto.html', title:'فري فاير (تلقائي)',icon:'fa-fire',           tags:'free fire auto تلقائي' },
      { path:'freefiremembership.html', title:'عضويات فري فاير', icon:'fa-id-card',   tags:'free fire vip عضوية' },
      { path:'freefireinbut.html', title:'شحن فري فاير يدوي', icon:'fa-fire',        tags:'free fire manual يدوي' },
      { path:'freefireN.html',    title:'فري فاير (N)',    icon:'fa-fire',           tags:'free fire' },
      { path:'pubg.html',         title:'ببجي',            icon:'fa-bullseye',       tags:'pubg ببجي uc شدات' },
      { path:'bloodstrike.html',  title:'Blood Strike',    icon:'fa-crosshairs',     tags:'بلود سترايك blood strike' },
      { path:'jawaker.html',      title:'جواكر',           icon:'fa-diamond',        tags:'jawaker جواكر' },
      { path:'yala.html',         title:'يلا لودو',        icon:'fa-dice',           tags:'yalla ludo يلا' },
      { path:'8ball.html',        title:'8 Ball Pool',     icon:'fa-circle',         tags:'8ball 8 بول بلياردو' },
      { path:'mobailleg.html',    title:'موبايل ليج',      icon:'fa-shield',         tags:'mobile legends موبايل ليج ل diamonds' },
      { path:'instainbut.html',   title:'خدمات انستغرام',  icon:'fa-instagram',      tags:'instagram متابعين سوشيال' },
      { path:'social.html',       title:'السوشيال',        icon:'fa-users',          tags:'سوشيال تيك توك انستغرام يوتيوب' },
      { path:'software.html',     title:'اشتراكات البرامج', icon:'fa-code',           tags:'برامج اكواد كروت software' },
      { path:'wallet.html',       title:'محفظتي',          icon:'fa-wallet',         tags:'محفظه رصيد حسابي' },
      { path:'edaa.html',         title:'الإيداع',         icon:'fa-coins',          tags:'ايداع شحن الرصيد تحويل دفع' },
      { path:'talabat.html',      title:'طلباتي',          icon:'fa-list',           tags:'طلباتي تتبع طلب order orders' },
      { path:'settings.html',     title:'الإعدادات',        icon:'fa-cog',            tags:'اعدادات الحساب' },
      { path:'login.html',        title:'تسجيل الدخول',     icon:'fa-right-to-bracket', tags:'تسجيل دخول' },
      { path:'Reviews.html',      title:'التقييمات',        icon:'fa-star',           tags:'تقييمات اراء' },
      { path:'terms.html',        title:'الشروط والأحكام',  icon:'fa-file-lines',     tags:'الشروط السياسه' }
    ];

    // تطبيع عربي + إنجليزي
    function norm(s){
      return (s||'').toString().toLowerCase()
        .replace(/[ًٌٍَُِّْـ]/g,'')
        .replace(/[إأآا]/g,'ا').replace(/ى/g,'ي').replace(/ة/g,'ه')
        .replace(/[^\p{L}\p{N}\s]/gu,' ').replace(/\s+/g,' ').trim();
    }

    function render(list){
      const wrap = document.getElementById('results');
      const noRes = document.getElementById('noRes');
      wrap.innerHTML = '';
      if (!list.length){ noRes.style.display='block'; return; }
      noRes.style.display = 'none';
      list.forEach(item => {
        const a = document.createElement('a');
        a.href = item.path + '?allow=1';
        a.className = 'result-card';
        a.innerHTML = `
          <i class="fa-solid ${item.icon}" aria-hidden="true"></i>
          <div>
            <p class="result-title">${item.title}</p>
            <p class="result-desc">${item.desc || item.path}</p>
          </div>
        `;
        a.addEventListener('click', ()=>{ try{ sessionStorage.setItem('nav:fromHome','1'); }catch(_){ } });
        wrap.appendChild(a);
      });
    }

    function search(q){
      const nq = norm(q);
      if (!nq){ render(PAGES); return; }
      const terms = nq.split(' ');
      const list = PAGES.filter(p => {
        const hay = norm(p.title + ' ' + (p.tags||'') + ' ' + (p.path||''));
        return terms.every(t => hay.includes(t));
      });
      render(list);
    }

    // تهيئة
    window.addEventListener('DOMContentLoaded', () => {
      render(PAGES);
      const input = document.getElementById('globalSearchInput');
      const btn = document.getElementById('globalSearchBtn');
      const go = ()=> search(input.value);
      btn.addEventListener('click', go);
      input.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ e.preventDefault(); go(); }});
      let t; input.addEventListener('input', ()=>{ clearTimeout(t); t=setTimeout(go, 150); });
    });
  </script>
</body>
</html>
